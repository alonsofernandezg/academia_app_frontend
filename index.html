<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeportIvA</title>

  <!-- W3.css -->
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css"/>

  <!-- Fuente ligera -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css?v=20260526j"/>
</head>
<body class="bg">

  <!-- Contenedor principal -->
  <div class="w3-container w3-padding-24">
    <div class="card w3-margin-auto">

      <!-- Header con logotipo minimalista -->
      <div class="w3-center w3-padding-24">
        <div class="logo w3-center w3-margin-bottom">
          <img
            src="images/deportiva-logo.png"
            alt="DeportIvA"
            class="logo-image">
        </div>
        <!-- Logo already includes the brand text -->
        <div id="authStatus" class="w3-small w3-margin-top w3-text-grey" role="status" aria-live="polite"></div>
      </div>

      <!-- Contenido intercambiable -->
      <div class="w3-container w3-padding-16">

        <!-- LOGIN (vista por defecto) -->
        <div id="view-login" class="view active">
          <h4 class="w3-text-dark-gray w3-margin-top-0">Iniciar sesión</h4>
          <form id="loginForm" novalidate>
            <label for="logEmail" class="w3-small w3-text-grey">Correo</label>
            <input id="logEmail" class="w3-input w3-border w3-margin-bottom"
                   type="email" placeholder="correo@ejemplo.com" autocomplete="email" aria-describedby="logMsg" required>
            <label for="logPass" class="w3-small w3-text-grey">Contraseña</label>
            <input id="logPass" class="w3-input w3-border"
                   type="password" placeholder="••••••••" autocomplete="current-password" aria-describedby="logMsg" required>

            <button id="logSubmitBtn" class="w3-button w3-indigo w3-margin-top w3-block"
                    type="submit">Ingresar</button>
            <div id="logMsg" class="auth-message w3-center w3-small w3-margin-top" role="status" aria-live="polite"></div>
          </form>

          <div class="w3-center w3-margin-top w3-small">
            ¿No tienes cuenta?
            <button type="button" class="link-button" data-go-view="register">Crear una cuenta</button><br>
            ¿Olvidaste tu contraseña?
            <button type="button" class="link-button" data-go-view="forgot">Recuperarla</button><br>
            ¿Ya te registraste?
            <button type="button" class="link-button" data-go-view="verify">Verificar cuenta</button>
          </div>
        </div>

        <!-- REGISTRO -->
        <div id="view-register" class="view">
          <h4 class="w3-text-dark-gray w3-margin-top-0">Crear cuenta</h4>
          <form id="registerForm" novalidate>
            <label for="regEmail" class="w3-small w3-text-grey">Correo</label>
            <input id="regEmail" class="w3-input w3-border w3-margin-bottom"
                   type="email" placeholder="correo@ejemplo.com" autocomplete="email" aria-describedby="regMsg" required>

            <div class="w3-row-padding no-left-right">
              <div class="w3-half s12">
                <label for="regPass" class="w3-small w3-text-grey">Contraseña</label>
                <input id="regPass" class="w3-input w3-border"
                       type="password" placeholder="Mín. 8 caracteres" autocomplete="new-password" aria-describedby="regMsg" required>
              </div>
              <div class="w3-half s12">
                <label for="regConfirm" class="w3-small w3-text-grey">Confirmar contraseña</label>
                <input id="regConfirm" class="w3-input w3-border"
                       type="password" placeholder="Repite tu contraseña" autocomplete="new-password" aria-describedby="regMsg" required>
              </div>
            </div>

            <button id="regSubmitBtn" class="w3-button w3-blue w3-margin-top w3-block"
                    type="submit">Crear cuenta</button>
            <div id="regMsg" class="auth-message w3-center w3-small w3-margin-top" role="status" aria-live="polite"></div>
          </form>

          <div class="w3-center w3-small w3-margin-top">
            ¿Ya tienes cuenta?
            <button type="button" class="link-button" data-go-view="login">Ingresar</button>
          </div>
        </div>

        <!-- VERIFICACIÓN -->
        <div id="view-verify" class="view">
          <h4 class="w3-text-dark-gray w3-margin-top-0">Verificar cuenta</h4>
          <p class="w3-small w3-text-grey">
            Te enviamos un código a tu correo. Ingrésalo para activar tu cuenta.
          </p>
          <form id="verifyForm" novalidate>
            <label for="verEmail" class="w3-small w3-text-grey">Correo</label>
            <input id="verEmail" class="w3-input w3-border w3-margin-bottom"
                   type="email" placeholder="correo@ejemplo.com" autocomplete="email" aria-describedby="verMsg" required>
            <label for="verCode" class="w3-small w3-text-grey">Código de verificación</label>
            <input id="verCode" class="w3-input w3-border"
                   type="text" placeholder="p. ej. CwN0_H0F..." aria-describedby="verMsg" required>

            <button id="verSubmitBtn" class="w3-button w3-blue w3-margin-top w3-block"
                    type="submit">Verificar</button>
            <div id="verMsg" class="auth-message w3-center w3-small w3-margin-top" role="status" aria-live="polite"></div>
          </form>

          <div class="w3-center w3-small w3-margin-top">
            ¿Aún no tienes cuenta?
            <button type="button" class="link-button" data-go-view="register">Crear cuenta</button> ·
            <button type="button" class="link-button" data-go-view="login">Volver a ingresar</button>
          </div>
        </div>

        <!-- OLVIDÉ MI CONTRASEÑA -->
        <div id="view-forgot" class="view">
          <h4 class="w3-text-dark-gray w3-margin-top-0">Recuperar contraseña</h4>
          <form id="forgotForm" novalidate>
            <label for="fpEmail" class="w3-small w3-text-grey">Correo</label>
            <input id="fpEmail" class="w3-input w3-border"
                   type="email" placeholder="correo@ejemplo.com" autocomplete="email" aria-describedby="fpMsg" required>

            <button id="fpSubmitBtn" class="w3-button w3-indigo w3-margin-top w3-block"
                    type="submit">Enviar enlace</button>
            <div id="fpMsg" class="auth-message w3-center w3-small w3-margin-top" role="status" aria-live="polite"></div>
          </form>

          <div class="w3-center w3-small w3-margin-top">
            <button type="button" class="link-button" data-go-view="login">Volver a ingresar</button>
          </div>
        </div>

        <!-- CAMBIAR CONTRASEÑA (requiere sesión) -->
        <div id="view-change" class="view">
          <div class="w3-panel w3-pale-red w3-round-large w3-small w3-margin-bottom">
            Cambiar contraseña
          </div>

          <form id="changePasswordForm" novalidate>
            <label for="cpCurrent" class="w3-small w3-text-grey">Contraseña actual</label>
            <input id="cpCurrent" class="w3-input w3-border"
                   type="password" placeholder="••••••••" autocomplete="current-password" aria-describedby="cpMsg" required>

            <div class="w3-row-padding no-left-right">
              <div class="w3-half s12">
                <label for="cpNew" class="w3-small w3-text-grey">Nueva contraseña</label>
                <input id="cpNew" class="w3-input w3-border" type="password" autocomplete="new-password" aria-describedby="cpMsg" required>
              </div>
              <div class="w3-half s12">
                <label for="cpConfirm" class="w3-small w3-text-grey">Confirmar nueva</label>
                <input id="cpConfirm" class="w3-input w3-border" type="password" autocomplete="new-password" aria-describedby="cpMsg" required>
              </div>
            </div>

            <button id="cpSubmitBtn" class="w3-button w3-teal w3-margin-top w3-block"
                    type="submit">Cambiar</button>
            <div id="cpMsg" class="auth-message w3-center w3-small w3-margin-top" role="status" aria-live="polite"></div>
          </form>

          <div class="w3-center w3-small w3-margin-top">
            <button type="button" class="link-button" data-go-view="login">Volver a ingresar</button> ·
            <button type="button" class="link-button" data-auth-logout="true">Cerrar sesión</button>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="js/config.js?v=20260513a"></script>
  <script src="js/app.js?v=20260516a"></script>
</body>
</html>
