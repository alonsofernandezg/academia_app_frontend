<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña | DeportIvA</title>

  <!-- W3.CSS + fuente -->
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ffffff 0%, #f7f8fc 40%, #eef2ff 100%);
      font-family: "Poppins", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      height: auto;
      padding: 16px;
      color: #1F2937;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 18px 50px rgba(31,41,55,.08);
      text-align: center;
    }

    .logo {
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      background-color: #3F51B5; color: white;
      border-radius: 12px;
      margin: 0 auto 16px;
    }

    h3,
    .card > p.w3-small {
      font-family: "Manrope", "Poppins", system-ui, sans-serif;
    }

    h3 {
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .card > p.w3-small {
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .card label[for] {
      display: block;
      margin-bottom: 8px;
      color: #667085 !important;
      font-size: 0.72rem !important;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .w3-input {
      min-height: 48px;
      height: 48px;
      border-radius: 18px;
      border: 1px solid #dbe7f5 !important;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow: 0 10px 24px rgba(15,38,68,.06);
      padding: 0 14px;
      color: #0F2644;
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }

    .w3-input::placeholder {
      color: #91a0b5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #1F4AA8, #2d67da);
      color: white;
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 44px;
      padding: 10px 16px;
      width: 100%;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 12px 24px rgba(15,38,68,.12);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 28px rgba(15,38,68,.16);
    }
    .btn:focus-visible,
    .w3-input:focus-visible {
      outline: 3px solid rgba(59,130,246,.3);
      outline-offset: 2px;
      border-color: #1F4AA8 !important;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79,163,247,.12), 0 14px 30px rgba(15,38,68,.10);
    }

    .btn[disabled] {
      opacity: .72;
      cursor: not-allowed;
    }

    .ok { color: #16A34A; }
    .err { color: #DC2626; }
    .fade { opacity: 0.6; transition: opacity .3s ease; }
    .feedback { min-height: 24px; }

    @media (max-width: 480px) {
      body {
        align-items: stretch;
        padding: 12px;
      }

      .card {
        max-width: none;
        padding: 24px 18px;
        margin: auto 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 64 64" width="36" height="36">
        <circle cx="32" cy="32" r="18" fill="white"/>
        <path d="M14 32h36M32 14v36" stroke="#3F51B5" stroke-width="2"/>
        <polygon points="32,24 38,28 36,36 28,36 26,28" fill="#3F51B5"/>
      </svg>
    </div>

    <h3 class="w3-text-indigo">Restablecer contraseña</h3>
    <p class="w3-small w3-text-grey">
      Ingresa una nueva contraseña para tu cuenta de <b>DeportIvA</b>.
    </p>

    <form id="resetForm" novalidate>
      <label for="newPass" class="w3-small w3-text-grey w3-left-align" style="display:block;margin-bottom:6px;">Nueva contraseña</label>
      <input id="newPass" class="w3-input w3-border w3-margin-bottom" type="password" placeholder="Nueva contraseña" autocomplete="new-password" aria-describedby="msg" required>
      <label for="confirmPass" class="w3-small w3-text-grey w3-left-align" style="display:block;margin-bottom:6px;">Confirmar contraseña</label>
      <input id="confirmPass" class="w3-input w3-border" type="password" placeholder="Confirmar contraseña" autocomplete="new-password" aria-describedby="msg" required>

      <button id="resetSubmitBtn" class="btn w3-margin-top" type="submit">Actualizar contraseña</button>
    </form>

    <div id="msg" class="feedback w3-small w3-margin-top" role="status" aria-live="polite"></div>
    <div id="redirect" class="feedback w3-small w3-text-grey w3-margin-top" role="status" aria-live="polite"></div>
  </div>

  <script src="js/config.js?v=20260513a"></script>
  <script src="js/reset.js?v=20260516a"></script>
</body>
</html>
